<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dark Reptile Cursor</title>

<style>
/* FORCE DARK BACKGROUND */
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    cursor: none;
    background: #05080f;
}

body {
    background:
        radial-gradient(circle at 30% 20%, #1b2735 0%, transparent 40%),
        radial-gradient(circle at 70% 30%, #0f3460 0%, transparent 45%),
        radial-gradient(circle at 50% 80%, #16213e 0%, transparent 50%),
        linear-gradient(135deg, #050505, #0a0f1c, #000);
}

/* BODY */
.segment {
    position: absolute;
    width: 30px;
    height: 20px;
    background: linear-gradient(145deg, #222, #000);
    border-radius: 50% 50% 40% 40%;
    box-shadow: 0 0 18px rgba(0,0,0,1);
    transform-origin: center;
    pointer-events: none;
}

/* HEAD */
.head {
    width: 46px;
    height: 34px;
    clip-path: polygon(0% 50%, 30% 0%, 100% 50%, 30% 100%);
    background: linear-gradient(145deg, #2a2a2a, #000);
    box-shadow: 0 0 32px rgba(0,0,0,1);
    z-index: 10;
}

/* EYES */
.eye {
    position: absolute;
    width: 7px;
    height: 7px;
    background: crimson;
    border-radius: 50%;
    top: 13px;
    box-shadow: 0 0 10px crimson;
}
.eye.left { left: 12px; }
.eye.right { right: 12px; }

/* BIG CLEAR LEGS */
.leg {
    position: absolute;
    width: 22px;
    height: 6px;
    background: #111;
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(0,0,0,1);
    transform-origin: left center;
    animation: walk 0.5s infinite alternate;
}

.front.left  { top: 8px;  left: -22px; }
.front.right { top: 8px;  right: -22px; animation-delay: .25s; }

.back.left   { bottom: 6px; left: -20px; animation-delay: .25s; }
.back.right  { bottom: 6px; right: -20px; }

/* WALK */
@keyframes walk {
    from { transform: rotate(-35deg); }
    to   { transform: rotate(35deg); }
}
</style>
</head>

<body>

<script>
const segments = [];
const length = 20;

let mouseX = innerWidth / 2;
let mouseY = innerHeight / 2;

document.addEventListener("mousemove", e => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

/* CREATE BODY */
for (let i = 0; i < length; i++) {
    const s = document.createElement("div");
    s.classList.add("segment");

    if (i === 0) {
        s.classList.add("head");
        s.innerHTML = `
            <div class="eye left"></div>
            <div class="eye right"></div>

            <div class="leg front left"></div>
            <div class="leg front right"></div>
            <div class="leg back left"></div>
            <div class="leg back right"></div>
        `;
    }

    document.body.appendChild(s);
    segments.push({ el: s, x: mouseX, y: mouseY });
}

/* ANIMATION */
function animate() {
    let x = mouseX;
    let y = mouseY;

    segments.forEach(seg => {
        seg.x += (x - seg.x) * 0.25;
        seg.y += (y - seg.y) * 0.25;

        const dx = x - seg.x;
        const dy = y - seg.y;
        const angle = Math.atan2(dy, dx) * 180 / Math.PI;

        seg.el.style.left = seg.x + "px";
        seg.el.style.top = seg.y + "px";
        seg.el.style.transform = `rotate(${angle}deg)`;

        x = seg.x;
        y = seg.y;
    });

    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
